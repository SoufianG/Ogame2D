services:
  # Frontend (Nginx + SPA)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DB_PATH=/data/ogame2d.db
      - CORS_ORIGIN=http://localhost
    volumes:
      - db-data:/data
    restart: unless-stopped
    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
